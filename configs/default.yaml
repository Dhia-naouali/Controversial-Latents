defaults:
  - mode: flux
  - extractor: ensemble
  - _self_


data:
  images_dir: "data/imagenet/val"
  num_seed_images: 32

optimization:
  batch_size: 32
  steps: 200
  lr: 0.05
  lr_min_ratio: 0.1

  repulsion_weight: 0.1
  log_every: 50
  save_every: 100

output:
  dir: "outputs/"

cross_eval:
  # extractors: ["dino", "ijepa", "clip", "classifier"]
  enabled: true
