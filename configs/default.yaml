  # divergence_weight: 1.0
  repulsion_weight: 0.1
  # tv_weight: 0.001

  # pixel_clip: true
  log_every: 50
  save_every: 100

output:
  dir: "outputs/"



cross_eval:
  # extractors: ["dino", "ijepa", "clip", "classifier"]
  enabled: true
