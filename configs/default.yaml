#   batch_size: 256               # Embedding batch size for ImageNet-Val
#   num_workers: 8

#   # Retrieval strategies (both used, then union + rerank)
#   use_centroid: true            # Query with mean of all optimized embeddings
#   use_ensemble: true            # Query with mean cosine sim over all optimized images
#   rerank: true                  # Rerank the union of both results by ensemble score

